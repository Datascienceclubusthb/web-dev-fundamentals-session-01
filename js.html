<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USTHB Data Science Club - Web Dev</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    padding: 40px;
    background: #0f172a;
    color: white;
    transition: 0.3s;
}

.light {
    background: white;
    color: black;
}

.container {
    max-width: 800px;
    margin: auto;
}

.section {
    margin-top: 30px;
    padding: 20px;
    background: #1e293b;
    border-radius: 10px;
}

.light .section {
    background: #e2e8f0;
}

button {
    margin-top: 10px;
    padding: 8px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Data Science Club - USTHB</h1>
<h2>Web Development Section</h2>

<button onclick="toggleTheme()">Toggle Theme</button>

<div class="section">
<h3>About</h3>
<p>
We build web applications for data science projects,
including AI dashboards and research tools.
</p>
</div>

<div class="section">
<h3>Projects</h3>
<ul id="projectList">
    <li>Ai Section</li>
    <li>Web Dev Sections</li>
    <li>Data Science Section</li>
</ul>
<button onclick="addProject()">Add Project</button>
</div>

<div class="section">
<h3>Members</h3>
<p>Total Active Members: <span id="count">0</span></p>
</div>

<div class="section">
<h3>Join Us</h3>
<input type="text" id="name" placeholder="Name">
<button onclick="apply()">Apply</button>
</div>

</div>

<script>

function toggleTheme() {
    document.body.classList.toggle("light");
}

function addProject() {
    let li = document.createElement("li");
    li.innerText = "New Web Project";
    document.getElementById("projectList").appendChild(li);
}

function apply() {
    let name = document.getElementById("name").value;
    if(name === "") {
        alert("Please enter your name");
    } else {
        alert("Application sent, " + name);
    }
}

let counter = 0;
let interval = setInterval(function() {
    if(counter >= 25) {
        clearInterval(interval);
    } else {
        counter++;
        document.getElementById("count").innerText = counter;
    }
}, 40);

</script>

</body>
</html>
